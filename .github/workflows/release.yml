name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Extract version and build executable
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}" -replace '^v', ''
        $arch = "${{ runner.arch }}".ToLower()
        $exeName = "socket_client-v$version-$arch"
        Write-Host "Building: $exeName.exe (Architecture: $arch)"
        echo "EXE_NAME=$exeName" >> $env:GITHUB_ENV
        pyinstaller --onefile --windowed --name $exeName socket_client.py

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ env.EXE_NAME }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}