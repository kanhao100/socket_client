name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（示例: v1.2.3）'
        required: true
        default: 'v0.0.0'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller azure-cognitiveservices-speech

    - name: Resolve version and output name
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}"
        }

        if ($version -notmatch '^v') {
          throw "版本号必须以 v 开头，例如 v1.2.3。当前值: $version"
        }

        $arch = "${{ runner.arch }}".ToLower()
        $exeName = "socket_client-$version-$arch"
        Write-Host "Version: $version"
        Write-Host "Building: $exeName.exe (Architecture: $arch)"
        echo "VERSION=$version" >> $env:GITHUB_ENV
        echo "EXE_NAME=$exeName" >> $env:GITHUB_ENV

    - name: Build executable
      shell: pwsh
      run: |
        pyinstaller --noconfirm --clean --onefile --windowed `
          --name socket_client `
          --hidden-import azure.cognitiveservices.speech `
          --collect-all azure.cognitiveservices.speech `
          socket_client.py

    - name: Rename executable with v-version
      shell: pwsh
      run: |
        $source = "dist/socket_client.exe"
        $target = "dist/${{ env.EXE_NAME }}.exe"
        if (!(Test-Path $source)) {
          throw "未找到构建产物: $source"
        }
        if (Test-Path $target) {
          Remove-Item $target -Force
        }
        Rename-Item -Path $source -NewName "${{ env.EXE_NAME }}.exe"
        Write-Host "Renamed -> $target"

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/${{ env.EXE_NAME }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}